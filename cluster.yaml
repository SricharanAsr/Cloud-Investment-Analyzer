apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: cloud-project-cluster
  region: us-east-1
  version: "1.30"

iam:
  serviceRoleARN: "arn:aws:iam::992382753275:role/LabRole"

managedNodeGroups:
  - name: standard-nodes
    instanceType: t3.medium
    minSize: 1
    maxSize: 3
    desiredCapacity: 2
    iam:
      instanceRoleARN: "arn:aws:iam::992382753275:role/LabRole"
