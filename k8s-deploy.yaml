apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-news-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-news
  template:
    metadata:
      labels:
        app: cloud-news
    spec:
      containers:
      - name: frontend
        image: 992382753275.dkr.ecr.us-east-1.amazonaws.com/cloud-news-frontend:latest
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-news-service
spec:
  type: LoadBalancer
  selector:
    app: cloud-news
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
